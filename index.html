<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockFlow ERP — ระบบจัดการคลังสินค้า</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   DESIGN SYSTEM — Industrial Precision Theme
   ═══════════════════════════════════════════ */
:root {
  /* ── LIGHT THEME ── */
  --bg-base:    #f4f6f9;
  --bg-surface: #ffffff;
  --bg-raised:  #f0f2f5;
  --bg-overlay: #e8eaed;
  --bg-hover:   #e2e6ea;

  --border-subtle:  #dde1e7;
  --border-default: #c4cad4;
  --border-strong:  #8b949e;

  --text-primary:   #1a1f2e;
  --text-secondary: #4a5568;
  --text-muted:     #a0aab8;
  --text-link:      #1f6feb;

  --accent-blue:    #1f6feb;
  --accent-teal:    #0d9488;
  --accent-amber:   #d97706;
  --accent-red:     #e53e3e;
  --accent-green:   #2f855a;
  --accent-purple:  #6d28d9;
  --accent-orange:  #ea580c;

  --status-draft:    #a0aab8;
  --status-pending:  #d97706;
  --status-approved: #1f6feb;
  --status-done:     #2f855a;
  --status-partial:  #0d9488;
  --status-cancel:   #e53e3e;

  --font-sans: 'Sarabun', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;

  --sidebar-w: 248px;
  --topbar-h:  52px;
  --radius-sm: 4px;
  --radius:    6px;
  --radius-lg: 10px;

  --shadow-sm: 0 1px 3px rgba(0,0,0,.4);
  --shadow-md: 0 4px 16px rgba(0,0,0,.5);
  --shadow-lg: 0 8px 32px rgba(0,0,0,.6);
  --shadow-overlay: 0 16px 48px rgba(0,0,0,.8);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-sans);
  background: var(--bg-base);
  color: var(--text-primary);
  font-size: 14px;
  line-height: 1.5;
  overflow: hidden;
  height: 100vh;
}

/* ─── LAYOUT ──────────────────────────────── */
#app { display: flex; height: 100vh; }

/* SIDEBAR */
.sidebar {
  width: var(--sidebar-w);
  background: #161b22;
  border-right: 1px solid #30363d;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
  transition: width .2s ease;
  z-index: 10;
}
.sidebar.collapsed { width: 56px; }
.sidebar.collapsed .nav-label,
.sidebar.collapsed .nav-badge,
.sidebar.collapsed .section-label,
.sidebar.collapsed .brand-text { display: none; }
.sidebar.collapsed .nav-item { justify-content: center; padding: 10px 0; }
.sidebar.collapsed .nav-icon { margin: 0; }

.brand {
  height: var(--topbar-h);
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 16px;
  border-bottom: 1px solid #30363d;
  flex-shrink: 0;
}
.brand-logo {
  width: 28px; height: 28px;
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-teal));
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: 14px;
}
.brand-text { line-height: 1.2; }
.brand-name { font-weight: 700; font-size: 13px; color: #e6edf3; letter-spacing: .4px; }
.brand-ver  { font-size: 10px; color: #484f58; font-family: var(--font-mono); }

.sidebar-nav { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 8px 0; }
.sidebar-nav::-webkit-scrollbar { width: 3px; }
.sidebar-nav::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }

.section-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  color: #484f58;
  padding: 12px 16px 4px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 16px;
  cursor: pointer;
  border-radius: 0;
  position: relative;
  transition: background .15s;
  border-left: 2px solid transparent;
  color: #8b949e;
  text-decoration: none;
  white-space: nowrap;
}
.nav-item:hover { background: #2d333b; color: #e6edf3; }
.nav-item.active {
  background: rgba(31,111,235,.18);
  border-left-color: #58a6ff;
  color: #e6edf3;
}
.nav-icon { font-size: 14px; width: 18px; text-align: center; flex-shrink: 0; }
.nav-label { font-size: 13px; flex: 1; }
.nav-badge {
  background: var(--accent-amber);
  color: var(--bg-base);
  font-size: 10px;
  font-weight: 700;
  padding: 1px 5px;
  border-radius: 10px;
  min-width: 18px;
  text-align: center;
  font-family: var(--font-mono);
}

.sidebar-footer {
  padding: 12px 16px;
  border-top: 1px solid #30363d;
  font-size: 11px;
  color: #8b949e;
}
.gs-status { display: flex; align-items: center; gap: 6px; }
.gs-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent-green);
  box-shadow: 0 0 6px var(--accent-green);
  animation: pulse 2s infinite;
}
.gs-dot.offline { background: var(--status-cancel); box-shadow: 0 0 6px var(--status-cancel); animation: none; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }

/* MAIN */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

.topbar {
  height: var(--topbar-h);
  background: #ffffff;
  border-bottom: 1px solid #dde1e7;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 20px;
  flex-shrink: 0;
}
.topbar-toggle { cursor: pointer; color: var(--text-secondary); padding: 4px; border-radius: var(--radius-sm); transition: background .15s; }
.topbar-toggle:hover { background: var(--bg-hover); color: var(--text-primary); }
.page-title { font-size: 15px; font-weight: 600; flex: 1; }
.breadcrumb { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); }

.topbar-right { display: flex; align-items: center; gap: 8px; }

.content { flex: 1; overflow-y: auto; padding: 20px; background: var(--bg-base); }
.content::-webkit-scrollbar { width: 6px; }
.content::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius: 3px; }

/* ─── COMPONENTS ────────────────────────── */

/* BUTTONS */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border-radius: var(--radius);
  font-family: var(--font-sans);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid transparent;
  transition: all .15s;
  white-space: nowrap;
  line-height: 1;
  text-decoration: none;
}
.btn:disabled { opacity: .4; cursor: not-allowed; }
.btn-primary   { background: var(--accent-blue); color: #fff; border-color: var(--accent-blue); }
.btn-primary:hover   { background: #1a5dcc; }
.btn-success   { background: transparent; color: var(--accent-green); border-color: var(--accent-green); }
.btn-success:hover   { background: rgba(63,185,80,.1); }
.btn-danger    { background: transparent; color: var(--accent-red); border-color: var(--accent-red); }
.btn-danger:hover    { background: rgba(248,81,73,.1); }
.btn-warning   { background: transparent; color: var(--accent-amber); border-color: var(--accent-amber); }
.btn-warning:hover   { background: rgba(217,119,6,.1); }
.btn-ghost     { background: transparent; color: var(--text-secondary); border-color: var(--border-default); }
.btn-ghost:hover     { background: var(--bg-hover); color: var(--text-primary); }
.btn-teal      { background: transparent; color: var(--accent-teal); border-color: var(--accent-teal); }
.btn-teal:hover      { background: rgba(20,184,166,.1); }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-xs { padding: 3px 8px; font-size: 11px; border-radius: var(--radius-sm); }
.btn-icon { padding: 6px; aspect-ratio: 1; justify-content: center; }

/* INPUTS */
.field { margin-bottom: 14px; }
.field-label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 5px;
  letter-spacing: .3px;
}
.field-label .req { color: var(--accent-red); margin-left: 2px; }
.input, .select, .textarea {
  width: 100%;
  padding: 7px 11px;
  background: var(--bg-raised);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius);
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-size: 13px;
  transition: border-color .15s;
  outline: none;
}
.input:focus, .select:focus, .textarea:focus { border-color: var(--accent-blue); box-shadow: 0 0 0 2px rgba(31,111,235,.15); }
.input::placeholder { color: var(--text-muted); }
.select option { background: var(--bg-raised); }
.textarea { resize: vertical; min-height: 72px; }
.input-mono { font-family: var(--font-mono); font-size: 12px; }
.input-group { display: flex; gap: 8px; }
.input-group .input { flex: 1; }
.field-hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

/* GRID */
.grid { display: grid; gap: 14px; }
.g2  { grid-template-columns: 1fr 1fr; }
.g3  { grid-template-columns: 1fr 1fr 1fr; }
.g4  { grid-template-columns: 1fr 1fr 1fr 1fr; }
.g14 { grid-template-columns: 1fr 4fr; }
.g31 { grid-template-columns: 3fr 1fr; }

/* CARDS */
.card {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  overflow: hidden;
}
.card-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 13px 18px;
  border-bottom: 1px solid var(--border-subtle);
  font-weight: 600;
  font-size: 13px;
}
.card-body { padding: 18px; }
.card-actions { margin-left: auto; display: flex; gap: 6px; align-items: center; }

/* STAT CARDS */
.stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
.stat-card {
  background: #ffffff;
  border: 1px solid #dde1e7;
  border-radius: var(--radius-lg);
  padding: 16px 18px;
  position: relative;
  overflow: hidden;
  transition: border-color .15s, transform .15s;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
}
.stat-card:hover { border-color: var(--border-default); transform: translateY(-1px); }
.stat-card::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: var(--stat-color, var(--accent-blue));
}
.stat-label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
.stat-value { font-size: 28px; font-weight: 700; font-family: var(--font-mono); color: var(--stat-color, var(--text-primary)); line-height: 1; }
.stat-sub { font-size: 11px; color: var(--text-muted); margin-top: 6px; }
.stat-icon { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); font-size: 28px; opacity: .08; }

/* BADGES */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 7px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  font-family: var(--font-mono);
}
.badge-draft    { background: #f0f2f5;             color: #6b7280; border: 1px solid #c4cad4; }
.badge-pending  { background: #fef3c7;             color: #92400e; border: 1px solid #fcd34d; }
.badge-approved { background: #dbeafe;             color: #1e40af; border: 1px solid #93c5fd; }
.badge-done     { background: #d1fae5;             color: #065f46; border: 1px solid #6ee7b7; }
.badge-partial  { background: #ccfbf1;             color: #0f766e; border: 1px solid #5eead4; }
.badge-cancel   { background: #fee2e2;             color: #991b1b; border: 1px solid #fca5a5; }
.badge-serial   { background: #ede9fe;             color: #5b21b6; border: 1px solid #c4b5fd; }
.badge-low      { background: #fee2e2;             color: #991b1b; border: 1px solid #fca5a5; }
.badge-ok       { background: #d1fae5;             color: #065f46; border: 1px solid #6ee7b7; }

/* TABLE */
.table-wrap { overflow-x: auto; }
.table {
  width: 100%;
  border-collapse: collapse;
}
.table th {
  background: #f8fafc;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .8px;
  color: #6b7280;
  padding: 10px 14px;
  text-align: left;
  white-space: nowrap;
  border-bottom: 1px solid var(--border-subtle);
  position: sticky;
  top: 0;
  z-index: 1;
}
.table td {
  padding: 10px 14px;
  border-bottom: 1px solid rgba(48,54,61,.5);
  font-size: 13px;
  vertical-align: middle;
}
.table tbody tr { transition: background .1s; }
.table tbody tr:hover td { background: #f0f7ff; }
.table tbody tr:last-child td { border-bottom: none; }

/* MONO TEXT */
.mono { font-family: var(--font-mono); font-size: 12px; }
.doc-id { color: var(--accent-blue); font-family: var(--font-mono); font-size: 12px; }
.ref-link {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  color: var(--accent-teal);
  font-family: var(--font-mono);
  font-size: 11px;
  cursor: pointer;
  padding: 1px 6px;
  border-radius: var(--radius-sm);
  background: rgba(20,184,166,.08);
  border: 1px solid rgba(20,184,166,.2);
  transition: background .15s;
  text-decoration: none;
}
.ref-link:hover { background: rgba(20,184,166,.15); }

/* TOOLBAR */
.toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.toolbar-right { margin-left: auto; display: flex; gap: 8px; flex-wrap: wrap; }
.search-box {
  position: relative;
  min-width: 200px;
}
.search-box input { padding-left: 30px; }
.search-box::before {
  content: '⌕';
  position: absolute;
  left: 9px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  pointer-events: none;
  font-size: 15px;
  line-height: 1;
}

/* TABS */
.tabs { display: flex; border-bottom: 1px solid var(--border-subtle); margin-bottom: 20px; gap: 0; }
.tab {
  padding: 10px 18px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: all .15s;
  white-space: nowrap;
}
.tab:hover { color: var(--text-primary); }
.tab.active { color: var(--accent-blue); border-bottom-color: var(--accent-blue); }

/* MODAL */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.75);
  backdrop-filter: blur(3px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9000;
  animation: fadeIn .15s ease;
  padding: 20px;
}
.modal {
  background: var(--bg-surface);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-lg);
  width: 100%;
  max-width: 720px;
  max-height: 90vh;
  display: flex;
  flex-direction: column;
  box-shadow: var(--shadow-overlay);
  animation: slideUp .2s ease;
}
.modal-xl { max-width: 1000px; }
.modal-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border-subtle);
  flex-shrink: 0;
}
.modal-title { font-size: 15px; font-weight: 700; flex: 1; }
.modal-body { padding: 20px; overflow-y: auto; flex: 1; }
.modal-body::-webkit-scrollbar { width: 4px; }
.modal-body::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius: 2px; }
.modal-footer {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  padding: 14px 20px;
  border-top: 1px solid var(--border-subtle);
  flex-shrink: 0;
}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ALERTS */
.alert {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 12px 14px;
  border-radius: var(--radius);
  font-size: 13px;
  margin-bottom: 16px;
  border-width: 1px;
  border-style: solid;
}
.alert-icon { font-size: 15px; flex-shrink: 0; }
.alert-info    { background: #dbeafe;  border-color: #93c5fd;  color: #1e40af; }
.alert-success { background: #d1fae5;  border-color: #6ee7b7;  color: #065f46; }
.alert-warning { background: #fef3c7;  border-color: #fcd34d;  color: #92400e; }
.alert-danger  { background: #fee2e2;  border-color: #fca5a5;  color: #991b1b; }

/* DOC LINE ITEMS */
.line-items-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.line-item {
  background: var(--bg-raised);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius);
  padding: 12px;
  margin-bottom: 8px;
  transition: border-color .15s;
}
.line-item:hover { border-color: var(--border-default); }
.line-item-grid { display: grid; gap: 8px; align-items: end; }

/* FLOW INDICATOR */
.flow {
  display: flex;
  align-items: center;
  gap: 0;
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  padding: 10px 16px;
  margin-bottom: 16px;
  overflow-x: auto;
}
.flow-step {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: var(--radius);
  font-size: 12px;
  font-weight: 500;
  color: var(--text-muted);
  white-space: nowrap;
  transition: all .15s;
}
.flow-step.done    { color: var(--accent-green); }
.flow-step.active  { background: rgba(31,111,235,.12); color: var(--accent-blue); font-weight: 700; }
.flow-step.pending { color: var(--text-muted); }
.flow-arrow { color: var(--border-default); font-size: 12px; flex-shrink: 0; margin: 0 2px; }

/* DIVIDER */
.divider { border: none; border-top: 1px solid var(--border-subtle); margin: 16px 0; }

/* TOAST */
#toast-container { position: fixed; top: 16px; right: 16px; z-index: 99999; display: flex; flex-direction: column; gap: 8px; }
.toast {
  display: flex;
  align-items: center;
  gap: 10px;
  background: #ffffff;
  border: 1px solid #c4cad4;
  border-radius: var(--radius-lg);
  padding: 12px 16px;
  min-width: 280px;
  max-width: 360px;
  box-shadow: var(--shadow-lg);
  animation: slideIn .25s ease;
  border-left-width: 3px;
}
.toast-success { border-left-color: var(--accent-green); }
.toast-error   { border-left-color: var(--accent-red); }
.toast-warning { border-left-color: var(--accent-amber); }
.toast-info    { border-left-color: var(--accent-blue); }
.toast-msg { font-size: 13px; flex: 1; }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* PROGRESS BAR */
.progress { height: 5px; background: var(--bg-overlay); border-radius: 3px; overflow: hidden; }
.progress-bar { height: 100%; border-radius: 3px; background: var(--accent-blue); transition: width .4s ease; }

/* EMPTY STATE */
.empty {
  text-align: center;
  padding: 48px 24px;
  color: var(--text-muted);
}
.empty-icon { font-size: 36px; margin-bottom: 12px; opacity: .4; }
.empty-text { font-size: 14px; margin-bottom: 4px; }
.empty-sub  { font-size: 12px; }

/* PRINT AREA */
@media print {
  .sidebar, .topbar, .toolbar, .modal-footer { display: none !important; }
  body { background: white; color: black; }
  .print-doc { display: block !important; }
}

/* SCROLLBAR GLOBAL */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-default); }

/* UTILITY */
.flex      { display: flex; }
.flex-col  { flex-direction: column; }
.items-center { align-items: center; }
.gap-6  { gap: 6px; }
.gap-8  { gap: 8px; }
.gap-12 { gap: 12px; }
.ml-auto { margin-left: auto; }
.mb-8  { margin-bottom: 8px; }
.mb-12 { margin-bottom: 12px; }
.mb-16 { margin-bottom: 16px; }
.mb-20 { margin-bottom: 20px; }
.mt-12 { margin-top: 12px; }
.mt-16 { margin-top: 16px; }
.fw-600 { font-weight: 600; }
.fw-700 { font-weight: 700; }
.fs-11  { font-size: 11px; }
.fs-12  { font-size: 12px; }
.fs-13  { font-size: 13px; }
.text-muted   { color: var(--text-muted); }
.text-secondary { color: var(--text-secondary); }
.text-blue    { color: var(--accent-blue); }
.text-green   { color: var(--accent-green); }
.text-red     { color: var(--accent-red); }

function canAccess(page){ return !!perm(page); }
function canEdit(page){
  const p=perm(page);
  return p==='all'||p==='create'||p==='approve';
}
function canCreate(page){
  const p=perm(page);
  return p==='all'||p==='create';
}
function canApprove(page){
  const p=perm(page);
  return p==='all'||p==='approve';
}
function perm(page){
  const role = SETTINGS.currentRole||'viewer';
  return (PERMISSIONS[page]||{})[role]||false;
}

/* ═══════════════════════════════════════════
   UTILITIES
   ═══════════════════════════════════════════ */
function genId(prefix){
  const d=new Date();
  const y=String(d.getFullYear()).slice(-2);
  const m=String(d.getMonth()+1).padStart(2,'0');
  const r=String(Math.floor(Math.random()*99999)).padStart(5,'0');
  return `${prefix}${y}${m}-${r}`;
}
function today(){ return new Date().toISOString().split('T')[0]; }
function fmtDate(d){ if(!d) return '-'; try{ return new Date(d).toLocaleDateString('th-TH',{year:'numeric',month:'short',day:'numeric'}); }catch{return d;} }
function fmtNum(n,dec=0){ return Number(n||0).toLocaleString('th-TH',{minimumFractionDigits:dec,maximumFractionDigits:dec}); }
function esc(s){ if(!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Stock engine
function getStock(itemId,warehouseId){
  return DB.stock.filter(s=>s.itemId===itemId&&s.whId===warehouseId).reduce((sum,s)=>sum+Number(s.qty),0);
}
function getStockAll(itemId){
  return DB.stock.filter(s=>s.itemId===itemId).reduce((sum,s)=>sum+Number(s.qty),0);
}
function addMove(docRef,docType,itemId,whId,qty,note=''){
  DB.stock.push({id:genId('MV'),date:today(),docRef,docType,itemId,whId,qty:Number(qty),note,ts:Date.now()});
  DB.save('stock');
}

// Serial tracking
function addSerial(sn,itemId,whId,docRef,op){
  const existing = DB.serials.find(s=>s.sn===sn&&s.itemId===itemId);
  if(existing){ existing.status=op==='in'?'available':'issued'; existing.lastDoc=docRef; existing.lastDate=today(); }
  else{ DB.serials.push({id:genId('SN'),sn,itemId,whId,status:op==='in'?'available':'issued',addedDoc:docRef,addedDate:today(),lastDoc:docRef,lastDate:today()}); }
  DB.save('serials');
}

// Status badge
function badge(status){
  const map={
    'ร่าง':'draft','รออนุมัติ':'pending','อนุมัติแล้ว':'approved','เสร็จสิ้น':'done',
    'บางส่วน':'partial','ยกเลิก':'cancel','รอรับ':'pending','รับแล้ว':'done'
  };
  const cls = map[status]||'draft';
  return `<span class="badge badge-${cls}">${esc(status||'ร่าง')}</span>`;
}

/* ═══════════════════════════════════════════
   TOAST
   ═══════════════════════════════════════════ */
function toast(msg,type='info'){
  const icons={success:'✓',error:'✕',warning:'⚠',info:'ℹ'};
  const el=document.createElement('div');
  el.className=`toast toast-${type}`;
  el.innerHTML=`<span style="font-size:15px">${icons[type]||'ℹ'}</span><span class="toast-msg">${esc(msg)}</span>`;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transform='translateX(100%)'; el.style.transition='.25s'; setTimeout(()=>el.remove(),300); },3500);
}

/* ═══════════════════════════════════════════
   EXPORT / IMPORT
   ═══════════════════════════════════════════ */
function exportJSON(data,filename){
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=filename+'.json'; a.click();
  toast('ส่งออก JSON สำเร็จ','success');
}
function exportCSV(rows,filename){
  if(!rows.length){ toast('ไม่มีข้อมูล','warning'); return; }
  const keys=Object.keys(rows[0]);
  const lines=[keys.join(','),...rows.map(r=>keys.map(k=>{ const v=r[k]; return typeof v==='string'&&(v.includes(','))||String(v).includes('\n')?`"${v.replace(/"/g,'""')}"`:(v??''); }).join(','))];
  const blob=new Blob(['\uFEFF'+lines.join('\r\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=filename+'.csv'; a.click();
  toast('ส่งออก CSV สำเร็จ','success');
}
function importJSON(collection,onDone){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='.json';
  inp.onchange=e=>{
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(!Array.isArray(data)) throw new Error('ต้องเป็น Array');
        DB[collection]=data; DB.save(collection);
        toast(`นำเข้า ${data.length} รายการสำเร็จ`,'success');
        if(onDone) onDone();
      }catch(err){ toast('ไฟล์ไม่ถูกต้อง: '+err.message,'error'); }
    };
    r.readAsText(f);
  };
  inp.click();
}

function saveGsConfig(){
  SETTINGS.gsId=document.getElementById('gsIdInput')?.value?.trim()||'';

  SETTINGS.gsWebAppUrl=document.getElementById('gsWebAppInput')?.value?.trim()||'';

  closeModal();

function testGsConnection(){
  if(!SETTINGS.gsId||!SETTINGS.gsKey){ toast('กรุณากรอก Spreadsheet ID และ API Key','warning'); return; }
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${SETTINGS.gsId}?key=${SETTINGS.gsKey}&fields=spreadsheetId`;
  toast('กำลังทดสอบ...','info');
  fetch(url).then(r=>r.json()).then(d=>{
    if(d.spreadsheetId){ SETTINGS.gsConnected=true; updateGsStatus(); toast('เชื่อมต่อสำเร็จ ✓','success'); }
    else{ toast('ไม่สามารถเชื่อมต่อ: '+JSON.stringify(d.error?.message),'error'); }
  }).catch(e=>toast('Connection error: '+e.message,'error'));
}
function updateGsStatus(){
  const dot=document.getElementById('gsDot');
  const lbl=document.getElementById('gsLabel');
  if(!dot||!lbl) return;
  if(SETTINGS.gsWebAppUrl&&SETTINGS.gsConnected){ dot.classList.remove('offline'); lbl.textContent='Sheets Sync พร้อม ✓'; }
  else if(SETTINGS.gsConnected){ dot.classList.remove('offline'); lbl.textContent='Sheets Read-only ✓'; }
  else if(SETTINGS.gsId){ dot.classList.add('offline'); lbl.textContent='Sheets (ยังไม่ทดสอบ)'; }
  else{ dot.classList.add('offline'); lbl.textContent='ยังไม่เชื่อมต่อ'; }
  // แสดง sync button ใน topbar
  const syncBtn=document.getElementById('syncBtn');
  if(syncBtn) syncBtn.style.display=SETTINGS.gsWebAppUrl?'':'none';
}

// POST ข้อมูลไปยัง Web App
async function gsPost(action, collection, data){
  if(!SETTINGS.gsWebAppUrl) return null;
  try{
    const res = await fetch(SETTINGS.gsWebAppUrl, {
      method: 'POST',
      headers: {'Content-Type':'text/plain'}, // Apps Script ต้องใช้ text/plain แทน application/json
      body: JSON.stringify({action, collection, data})
    });
    return await res.json();
  }catch(e){
    console.error('gsPost error:', e);
    return null;
  }
}

// GET ข้อมูลจาก Web App
async function gsGet(params={}){
  if(!SETTINGS.gsWebAppUrl) return null;
  try{
    const qs = new URLSearchParams(params).toString();
    const res = await fetch(SETTINGS.gsWebAppUrl + '?' + qs);
    return await res.json();
  }catch(e){
    console.error('gsGet error:', e);
    return null;
  }
}

// Sync เอกสารเดียวขึ้น Sheets (เรียกหลัง save ทุกครั้ง)
async function syncDoc(collection, doc){
  if(!SETTINGS.gsWebAppUrl) return;
  const result = await gsPost('upsert', collection, doc);
  if(result?.ok){
    console.log('Synced', collection, doc.id);
  } else {
    console.warn('Sync failed', collection, result);
  }
}

// Sync ทั้งหมดจาก localStorage ขึ้น Sheets
async function syncAllToSheets(){
  if(!SETTINGS.gsWebAppUrl){ toast('ยังไม่ได้ใส่ Web App URL','warning'); openGsConfig(); return; }
  if(SETTINGS.gsSyncing){ toast('กำลัง Sync อยู่...','info'); return; }

  SETTINGS.gsSyncing = true;
  const syncBtn = document.getElementById('syncBtn');
  if(syncBtn){ syncBtn.textContent = '⏳ กำลัง Sync...'; syncBtn.disabled = true; }
  toast('กำลัง Sync ข้อมูลทั้งหมดขึ้น Google Sheets...', 'info');

  const allData = {};
  ['items','warehouses','suppliers','pr','po','grn','mreq','mout','mret','adj','trn','stock','serials'].forEach(k=>{
    allData[k] = DB[k] || [];
  });

  const result = await gsPost('fullSync', '', allData);

  SETTINGS.gsSyncing = false;
  if(syncBtn){ syncBtn.textContent = '🔄 Sync ขึ้น Sheets'; syncBtn.disabled = false; }

  if(result?.ok){
    const counts = Object.entries(result.results||{}).map(([k,v])=>k+': '+v).join(', ');
    toast('Sync สำเร็จ ✓ — '+counts, 'success');
  } else {
    toast('Sync ล้มเหลว: '+(result?.error||'unknown error'), 'error');
  }
}

// ดึงข้อมูลจาก Sheets มาแทนที่ localStorage
async function pullFromSheets(){
  if(!SETTINGS.gsWebAppUrl){ toast('ยังไม่ได้ใส่ Web App URL','warning'); return; }
  toast('กำลังดึงข้อมูลจาก Google Sheets...', 'info');

  const result = await gsGet({action:'syncAll'});
  if(!result?.ok){ toast('ดึงข้อมูลล้มเหลว: '+(result?.error||'unknown'), 'error'); return; }

  const data = result.data || {};
  let count = 0;
  ['items','warehouses','suppliers','pr','po','grn','mreq','mout','mret','adj','trn','stock','serials'].forEach(k=>{
    if(Array.isArray(data[k]) && data[k].length > 0){
      DB[k] = data[k];
      DB.save(k);
      count += data[k].length;
    }
  });

  toast('ดึงข้อมูลสำเร็จ '+count+' รายการ — Refresh หน้าจอ', 'success');
  setTimeout(()=>{ renderNav(); renderPage(); }, 800);
}

function doLogin(){
  const u = document.getElementById('loginUser')?.value?.trim();
  const p = document.getElementById('loginPass')?.value;
  const errEl = document.getElementById('loginError');
  const user = DB.users.find(x=>x.username===u && x.password===p && x.active!==false);
  if(!user){
    errEl.style.display='block';
    document.getElementById('loginPass').value='';
    return;
  }
  errEl.style.display='none';
  SETTINGS.currentUser   = user.name;
  SETTINGS.currentUserId = user.id;
  SETTINGS.currentRole   = user.role;
  SETTINGS.currentDept   = user.dept||'ทั่วไป';
  localStorage.setItem('sf_session', JSON.stringify({id:user.id,ts:Date.now()}));
  document.getElementById('loginScreen').style.display='none';
  updateUserBadge();
  renderNav();
  renderPage();
  toast(`ยินดีต้อนรับ ${user.name} (${ROLE_LABELS[user.role]||user.role})`, 'success');
  // Auto Pull หลัง login
  if(SETTINGS.gsWebAppUrl){
    setTimeout(autoPullOnLoad, 600);
    startAutoSync();
    updateSyncStatusBar();
  }
}

function doLogout(){
  localStorage.removeItem('sf_session');
  SETTINGS.currentUser=''; SETTINGS.currentRole=''; SETTINGS.currentUserId='';

  document.getElementById('loginScreen').style.display='flex';

function restoreSession(){
  try{
    const sess = JSON.parse(localStorage.getItem('sf_session')||'null');
    if(!sess) return false;
    // session หมดอายุ 8 ชั่วโมง
    if(Date.now()-sess.ts > 8*60*60*1000){ localStorage.removeItem('sf_session'); return false; }
    const user = DB.users.find(x=>x.id===sess.id && x.active!==false);
    if(!user) return false;
    SETTINGS.currentUser   = user.name;
    SETTINGS.currentUserId = user.id;
    SETTINGS.currentRole   = user.role;
    SETTINGS.currentDept   = user.dept||'ทั่วไป';
    return true;
  }catch{ return false; }
}

  const dept  = document.getElementById('uf_dept')?.value?.trim();
  const role  = document.getElementById('uf_role')?.value;
  const active= document.getElementById('uf_active')?.value==='true';
  if(!name||!uname){ toast('กรอกชื่อและ Username','warning'); return; }
  // check duplicate username
  const dup = DB.users.find(x=>x.username===uname&&x.id!==id);
  if(dup){ toast('Username นี้มีอยู่แล้ว','error'); return; }
  if(!isEdit&&!pass){ toast('กรอก Password','warning'); return; }

  } else {
    DB.users.push({id,name,username:uname,password:pass,dept,role,active});
  }
  DB.save('users');
  closeModal(); navigate('users');
  toast(`${isEdit?'แก้ไข':'เพิ่ม'}ผู้ใช้ ${name} สำเร็จ`,'success');
};

/* ═══════════════════════════════════════════
   DOCUMENT NUMBER ENGINE
   PR format: PR6903NNNN (PR + YY + MM + running 4 digits)
   ═══════════════════════════════════════════ */
function genDocNo(prefix, collection){
  const d = new Date();
  const yy = String(d.getFullYear()).slice(-2);   // 69 (พ.ศ. 2569 = 2026)
  const bey = String(d.getFullYear() + 543).slice(-2); // ปี พ.ศ.
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const tag = bey + mm; // เช่น 6903
  // หาเลขล่าสุดในปีเดือนนี้
  const existing = (DB[collection]||[]).filter(x => {
    const docTag = String(x.id||'').slice(prefix.length, prefix.length+4);
    return docTag === tag;
  });
  const maxSeq = existing.reduce((max, x) => {
    const seq = parseInt(String(x.id||'').slice(prefix.length+4)) || 0;
    return Math.max(max, seq);
  }, 0);
  return prefix + tag + String(maxSeq+1).padStart(4,'0');
}

// Project Autocomplete — ใช้ sf-ac system เดียวกับ item AC
function makeProjectAC(noInputId, nameInputId){
  const inp = document.getElementById(noInputId);
  if(!inp || inp.dataset.sfacReady) return;
  inp.dataset.sfacReady = '1';

  // แปลง input เดิมให้เป็น sf-ac-input style
  inp.classList.add('sf-ac-input');
  inp.classList.remove('input');

  // ห่อด้วย .sf-ac wrapper
  const parent = inp.parentElement;
  parent.classList.add('sf-ac');

  // สร้าง menu
  const menuId = noInputId + '_sfmenu';
  let menu = document.getElementById(menuId);
  if(!menu){
    menu = document.createElement('div');
    menu.className = 'sf-ac-menu';
    menu.id = menuId;
    parent.appendChild(menu);
  }

  function buildRows(q){
    q = (q||'').toLowerCase().trim();
    const active = DB.projects.filter(p=>p.active!==false);
    if(!active.length){
      return `<div class="sf-ac-empty" style="padding:14px">
        📂 ยังไม่มีโครงการ — ไปเพิ่มที่<br>
        <button class="btn btn-primary btn-xs mt-8" onmousedown="event.preventDefault();closeModal();navigate('projects')">+ เพิ่มโครงการ</button>
      </div>`;
    }
    const matches = q
      ? active.filter(p=>(p.projNo||p.no||'').toLowerCase().includes(q)||(p.projName||p.name||'').toLowerCase().includes(q)).slice(0,40)
      : active.slice(0,40);
    if(!matches.length) return `<div class="sf-ac-empty">ไม่พบ "${q}"</div>`;
    return matches.map(p=>{
      const no   = p.projNo||p.no||p.code||'';
      const name = p.projName||p.name||'';
      const safeNo   = no.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      const safeName = name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
      return `<div class="sf-ac-row"
          onmousedown="event.preventDefault();sfacPickProject('${noInputId}','${nameInputId}','${safeNo}','${safeName}')">
        <span class="sf-ac-code">${esc(no)}</span>
        <span class="sf-ac-name">${esc(name)}</span>
      </div>`;
    }).join('');
  }

  inp.addEventListener('input',  ()=>{ menu.innerHTML=buildRows(inp.value); menu.classList.add('show'); });
  inp.addEventListener('focus',  ()=>{ menu.innerHTML=buildRows(inp.value); menu.classList.add('show'); });
  inp.addEventListener('blur',   ()=>{ menu.classList.remove('show'); });

  // auto-pull projects จาก Sheets ถ้าว่าง
  if(!DB.projects.filter(p=>p.active!==false).length && SETTINGS.gsId && SETTINGS.gsKey && !window._projPullDone){
    window._projPullDone = true;
    pullProjectsSilent().then(n=>{ if(n>0) toast(`โหลด ${n} โครงการจาก Sheets ✓`,'success'); });
  }
}

window.sfacPickProject = function(noInputId, nameInputId, no, name){
  const noInp   = document.getElementById(noInputId);
  const nameInp = document.getElementById(nameInputId);
  if(noInp)   noInp.value   = no;
  if(nameInp) nameInp.value = name;
  const menu = document.getElementById(noInputId + '_sfmenu');
  if(menu) menu.classList.remove('show');
}
// ดึง Projects จาก Sheets แบบ silent (ไม่แสดง toast)
async function pullProjectsSilent(){
  try{
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${SETTINGS.gsId}/values/Project?key=${SETTINGS.gsKey}`;
    const res = await fetch(url);
    const data = await res.json();
    if(!data.values || data.values.length < 2) return 0;
    // หา header row (รองรับ header ภาษาไทยหรืออังกฤษ)
    const firstRow = data.values[0].map(h=>String(h||'').toLowerCase().trim());
    const startIdx = (firstRow[0].includes('no') || firstRow[0].includes('project') || firstRow[0].includes('รหัส')) ? 1 : 0;
    const rows = data.values.slice(startIdx);
    let count = 0;
    rows.forEach(row=>{
      const no   = String(row[0]||'').trim();
      const name = String(row[1]||'').trim();
      if(!no||!name) return;
      const existing = DB.projects.find(x=>(x.projNo||x.no)===no);
      if(existing){ existing.projName=name; existing.name=name; }
      else{ DB.projects.push({id:genId('PRJ'), projNo:no, projName:name, no, name, active:true}); count++; }
    });
    DB.save('projects');
    return DB.projects.filter(p=>p.active!==false).length;
  }catch(e){ return 0; }
}

window.filterStock=function(){
  const q=document.getElementById('stockQ')?.value||'';
  const wh=document.getElementById('stockWh')?.value||'';
  const cat=document.getElementById('stockCat')?.value||'';
  const tbody=document.getElementById('stockTbody'); if(!tbody) return;
  const rows=DB.items.filter(i=>{
    if(q&&!`${i.code}${i.name}${i.category}`.toLowerCase().includes(q.toLowerCase())) return false;
    if(cat&&i.category!==cat) return false;
    return true;
  }).map(i=>{
    const totals=DB.warehouses.reduce((acc,w)=>{acc[w.id]=getStock(i.id,w.id);return acc;},{});
    const total=Object.values(totals).reduce((a,b)=>a+b,0);
    const low=i.minQty&&total<Number(i.minQty);
    const snCount=i.hasSerial?DB.serials.filter(s=>s.itemId===i.id&&s.status==='available').length:0;
    return `<tr>
      <td><span class="mono text-blue">${esc(i.code)}</span></td>
      <td><div class="fw-600">${esc(i.name)}</div>${i.category?`<div class="fs-11 text-muted">${esc(i.category)}</div>`:''}</td>
      <td>${esc(i.unit)}</td>
      ${DB.warehouses.map(w=>`<td class="text-right mono">${fmtNum(totals[w.id])}</td>`).join('')}
      <td class="text-right fw-700 mono ${low?'text-red':''}">${fmtNum(total)}</td>
      <td class="text-right mono text-muted">${i.minQty?fmtNum(i.minQty):'-'}</td>
      <td>${low?'<span class="badge badge-low">⚠ ต่ำ</span>':'<span class="badge badge-ok">✓</span>'}</td>
      <td>${i.hasSerial?`<span class="badge badge-serial">🔢 ${snCount}</span>`:'<span class="text-muted fs-11">—</span>'}</td>
      <td><button class="btn btn-xs btn-ghost" onclick="viewStockLedger('${i.id}')">Ledger</button></td>
    </tr>`;
  });
  tbody.innerHTML = rows.join('')||`<tr><td colspan="99"><div class="empty"><div class="empty-icon">⊞</div><div class="empty-text">ไม่พบสินค้า</div></div></td></tr>`;
};
function getStockExport(){
  return DB.items.map(i=>{
    const obj={code:i.code,name:i.name,category:i.category,unit:i.unit,minQty:i.minQty};
    DB.warehouses.forEach(w=>{obj[w.name]=getStock(i.id,w.id);});
    obj.total=getStockAll(i.id);
    return obj;
  });
}
window.viewStockLedger=function(itemId){
  const item=DB.items.find(x=>x.id===itemId);
  const moves=DB.stock.filter(s=>s.itemId===itemId).sort((a,b)=>b.ts-a.ts);
  openModal(`
    <div class="modal-header">
      <div class="modal-title">📒 Stock Ledger — ${esc(item?.name||itemId)}</div>
      <button class="btn btn-ghost btn-icon btn-sm" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="table-wrap">
        <table class="table">
          <thead><tr><th>วันที่</th><th>เอกสาร</th><th>ประเภท</th><th>คลัง</th><th class="text-right">จำนวน</th></tr></thead>
          <tbody>
            ${moves.map(m=>`<tr>
              <td class="fs-12">${fmtDate(m.date)}</td>
              <td><span class="doc-id">${esc(m.docRef)}</span></td>
              <td><span class="badge badge-approved">${esc(m.docType)}</span></td>
              <td>${esc(whName(m.whId))}</td>
              <td class="text-right mono fw-600 ${m.qty>=0?'text-green':'text-red'}">${m.qty>=0?'+':''}${fmtNum(m.qty)}</td>
            </tr>`).join('')||`<tr><td colspan="5"><div class="empty"><div class="empty-icon">📒</div><div class="empty-text">ยังไม่มีการเคลื่อนไหว</div></div></td></tr>`}

/* ═══════════════════════════════════════════
   LINE ITEMS MANAGER (generic reusable)
   ═══════════════════════════════════════════ */
class LineItemsMgr {
  constructor(id, cfg={}){ this.id=id; this._items=[]; this.cfg=cfg; }
  get(){ return this._items.filter(x=>x.itemId); }
  setFromDocs(docs){ this._items=docs.map(d=>({...d})); this._render(); }
  html(){
    return `<div class="line-items-header">
        <div class="fw-600 fs-13">รายการสินค้า</div>
        <button class="btn btn-xs btn-ghost" onclick="window._LIM_${this.id}.add()">+ เพิ่มรายการ</button>
      </div>
      <div id="li_${this.id}"></div>`;
  }
  init(){ window[`_LIM_${this.id}`]=this; this._render(); }
  add(){ this._items.push({itemId:'',qty:1,unit:'',note:'',price:0}); this._render(); }
  remove(i){ this._items.splice(i,1); this._render(); }

  /* ── Item search input HTML ── */
  _itemInputHtml(it, i){
    const limId = this.id;
    const cur   = DB.items.find(x=>x.id===it.itemId);
    const val   = cur ? `${cur.code} — ${cur.name}` : '';
    return `<div class="sf-ac" id="sfac_${limId}_${i}">
      <input class="sf-ac-input" id="sfacinp_${limId}_${i}"
        value="${esc(val)}" placeholder="พิมพ์รหัสหรือชื่อสินค้า…" autocomplete="off"
        oninput="sfacFilter('${limId}',${i},this.value)"
        onfocus="sfacOpen('${limId}',${i},this.value)"
        onblur="sfacBlur('${limId}',${i})">
      <div class="sf-ac-menu" id="sfacmenu_${limId}_${i}"></div>
    </div>`;
  }

  _render(){
    const el=document.getElementById(`li_${this.id}`); if(!el) return;
    if(!this._items.length){
      el.innerHTML=`<div class="alert alert-info"><span class="alert-icon">ℹ</span><span>กดปุ่ม "+ เพิ่มรายการ" เพื่อเพิ่มสินค้า</span></div>`;
      return;
    }
    el.innerHTML=this._items.map((it,i)=>`
      <div class="line-item">
        <div class="line-item-grid" style="grid-template-columns:2.5fr ${this.cfg.showPrice?'1fr ':''} 1fr 1fr ${this.cfg.showSerial?'2fr ':''} auto">
          <div>
            <label class="field-label">สินค้า <span class="req">*</span></label>
            ${this._itemInputHtml(it, i)}
          </div>
          <div>
            <label class="field-label">จำนวน <span class="req">*</span></label>
            <input class="input" type="number" min="0.001" step="any" value="${it.qty||1}" oninput="window._LIM_${this.id}._items[${i}].qty=+this.value">
          </div>
          <div>
            <label class="field-label">หน่วย</label>
            <input class="input" id="sfacunit_${this.id}_${i}" value="${esc(it.unit)}" readonly style="background:var(--bg-base)">
          </div>
          ${this.cfg.showPrice?`<div>
            <label class="field-label">ราคา/หน่วย (฿)</label>
            <input class="input" type="number" min="0" step="any" value="${it.price||0}" oninput="window._LIM_${this.id}._items[${i}].price=+this.value">
          </div>`:''}
          ${this.cfg.showSerial&&it.itemId&&DB.items.find(x=>x.id===it.itemId)?.hasSerial?`<div>
            <label class="field-label">🔢 Serial Numbers (คั่น ,)</label>
            <input class="input input-mono" placeholder="SN001,SN002,..." value="${esc(it.serials||'')}" oninput="window._LIM_${this.id}._items[${i}].serials=this.value">
          </div>`:''}
          <div style="display:flex;align-items:flex-end">
            <button class="btn btn-danger btn-icon btn-sm" onclick="window._LIM_${this.id}.remove(${i})" title="ลบ">✕</button>
          </div>
        </div>
        <div class="li-stock fs-11 text-muted mt-8" id="sfacstock_${this.id}_${i}">${it.itemId?`Stock รวม: <strong class="text-teal">${fmtNum(getStockAll(it.itemId))} ${esc(it.unit)}</strong>`:''}</div>
      </div>`).join('');
  }
  _onItemChange(i,val){
    const item=DB.items.find(x=>x.id===val);
    this._items[i].itemId=val;
    this._items[i].unit=item?.unit||'';
    this._items[i].price=item?.cost||0;
    this._render();
  }
}

/* ══ Standalone sfac helpers (ใช้ window scope เพื่อเรียกจาก inline HTML) ══ */
function sfacRows(q){
  q = (q||'').toLowerCase().trim();
  const list = q
    ? DB.items.filter(it=>it.code.toLowerCase().includes(q)||it.name.toLowerCase().includes(q)||(it.category||'').toLowerCase().includes(q)).slice(0,60)
    : DB.items.slice(0,60);
  if(!list.length) return '<div class="sf-ac-empty">ไม่พบสินค้า</div>';
  return list.map(it=>`<div class="sf-ac-row"
      onmousedown="event.preventDefault();sfacPick('${it.limId||''}','${it.rowIdx||''}','${it.id}')">
    <span class="sf-ac-code">${esc(it.code)}</span>
    <span class="sf-ac-name">${esc(it.name)}</span>
    <span class="sf-ac-meta">${esc(it.unit)} | ${fmtNum(getStockAll(it.id))}</span>
  </div>`).join('');
}

function sfacBuildRows(limId, i, q){
  q = (q||'').toLowerCase().trim();
  const list = q
    ? DB.items.filter(it=>it.code.toLowerCase().includes(q)||it.name.toLowerCase().includes(q)||(it.category||'').toLowerCase().includes(q)).slice(0,60)
    : DB.items.slice(0,60);
  if(!list.length) return '<div class="sf-ac-empty">ไม่พบสินค้า</div>';
  return list.map(it=>`<div class="sf-ac-row"
      onmousedown="event.preventDefault();sfacPick('${limId}',${i},'${it.id}')">
    <span class="sf-ac-code">${esc(it.code)}</span>
    <span class="sf-ac-name">${esc(it.name)}</span>
    <span class="sf-ac-meta">${esc(it.unit)} | ${fmtNum(getStockAll(it.id))}</span>
  </div>`).join('');
}

window.sfacOpen = function(limId, i, q){
  const menu = document.getElementById(`sfacmenu_${limId}_${i}`);
  if(!menu) return;
  menu.innerHTML = sfacBuildRows(limId, i, q);
  menu.classList.add('show');
};
window.sfacFilter = function(limId, i, q){
  const menu = document.getElementById(`sfacmenu_${limId}_${i}`);
  if(!menu) return;
  menu.innerHTML = sfacBuildRows(limId, i, q);
  menu.classList.add('show');
};
window.sfacBlur = function(limId, i){
  const menu = document.getElementById(`sfacmenu_${limId}_${i}`);
  // blur fires AFTER mousedown — ถ้า mousedown ใช้ preventDefault() blur จะไม่ fire
  // แต่ถ้า click ออกนอก dropdown ก็ควรปิด
  if(menu) menu.classList.remove('show');
};
window.sfacPick = function(limId, i, itemId){
  // event.preventDefault() ใน onmousedown ป้องกัน blur ไม่ให้ fire
  const item = DB.items.find(x=>x.id===itemId);
  const lim  = window[`_LIM_${limId}`];
  if(lim){
    lim._items[i].itemId = itemId;
    lim._items[i].unit   = item?.unit||'';
    lim._items[i].price  = item?.cost||0;
  }
  // set input value
  const inp  = document.getElementById(`sfacinp_${limId}_${i}`);
  if(inp) inp.value = item ? `${item.code} — ${item.name}` : '';
  // ปิด menu ทันที
  const menu = document.getElementById(`sfacmenu_${limId}_${i}`);
  if(menu) menu.classList.remove('show');
  // อัปเดต unit + stock
  const unitInp  = document.getElementById(`sfacunit_${limId}_${i}`);
  const stockEl  = document.getElementById(`sfacstock_${limId}_${i}`);
  if(unitInp) unitInp.value = item?.unit||'';
  if(stockEl && item) stockEl.innerHTML = `Stock รวม: <strong class="text-teal">${fmtNum(getStockAll(itemId))} ${esc(item.unit||'')}</strong>`;
}

window.savePR=function(id,status,isEdit){
  const req=document.getElementById('pr_req')?.value?.trim();
  if(!req){ toast('กรุณากรอกชื่อผู้ขอ','warning'); return; }
  const lim=window._LIM_pr_f;
  const items=lim?lim.get():[];
  if(!items.length){ toast('กรุณาเพิ่มรายการสินค้า','warning'); return; }
  const doc={id,date:today(),requester:req,dept:document.getElementById('pr_dept')?.value||'',
    needDate:document.getElementById('pr_need')?.value||'',note:document.getElementById('pr_note')?.value||'',
    projNo:document.getElementById('pr_projno')?.value||'',
    projName:document.getElementById('pr_projname')?.value||'',
    status,items};
  if(isEdit){ const idx=DB.pr.findIndex(x=>x.id===id); if(idx>-1) DB.pr[idx]={...DB.pr[idx],...doc}; }
  else DB.pr.push(doc);
  DB.save('pr'); syncDoc('pr', doc); closeModal(); renderNav(); navigate('pr');
  toast(`${isEdit?'แก้ไข':'สร้าง'} PR ${id} สำเร็จ`,'success');
};
window.approvePR=function(id){
  const pr=DB.pr.find(x=>x.id===id); if(!pr) return;
  pr.status='อนุมัติแล้ว'; DB.save('pr'); renderNav(); navigate('pr');
  toast(`อนุมัติ PR ${id} แล้ว`,'success');
};
window.prToPO=function(prId){
  const pr=DB.pr.find(x=>x.id===prId); if(!pr) return;
  openPOForm(null,pr);
};

window.savePO=function(id,prRef,isEdit){
  const sup=document.getElementById('po_sup')?.value;
  const wh=document.getElementById('po_wh')?.value;
  if(!sup){ toast('เลือก Supplier ด้วย','warning'); return; }
  if(!wh){ toast('เลือกคลังด้วย','warning'); return; }
  const lim=window._LIM_po_f;
  const items=lim?lim.get():[];
  if(!items.length){ toast('เพิ่มรายการสินค้า','warning'); return; }
  const doc={id,date:today(),prRef:prRef||'',supplierId:sup,whId:wh,
    delivDate:document.getElementById('po_deliv')?.value||'',
    note:document.getElementById('po_note')?.value||'',
    projNo:document.getElementById('po_projno')?.value||'',
    projName:document.getElementById('po_projname')?.value||'',
    status:'รอรับ',items};
  if(isEdit){ const idx=DB.po.findIndex(x=>x.id===id); if(idx>-1) DB.po[idx]={...DB.po[idx],...doc}; }
  else DB.po.push(doc);
  if(prRef){ const pr=DB.pr.find(x=>x.id===prRef); if(pr){ pr.poRef=id; DB.save('pr'); } }
  DB.save('po'); syncDoc('po', doc); closeModal(); navigate('po');
  toast(`สร้าง PO ${id} สำเร็จ`,'success');
};

window.saveGRN=function(id,poRef,isEdit){
  const wh=document.getElementById('grn_wh')?.value;
  if(!wh){ toast('เลือกคลังด้วย','warning'); return; }
  const lim=window._LIM_grn_f;
  const items=lim?lim.get():[];
  if(!items.length){ toast('เพิ่มรายการสินค้า','warning'); return; }
  const prRef=document.getElementById('grn_prref')?.value||'';
  const doc={id,date:document.getElementById('grn_date')?.value||today(),poRef:poRef||'',prRef,
    whId:wh,receiver:document.getElementById('grn_recv')?.value||'',
    note:document.getElementById('grn_note')?.value||'',
    projNo:document.getElementById('grn_projno')?.value||'',
    projName:document.getElementById('grn_projname')?.value||'',
    status:'เสร็จสิ้น',items};
  if(isEdit){ const idx=DB.grn.findIndex(x=>x.id===id); if(idx>-1) DB.grn[idx]={...DB.grn[idx],...doc}; }
  else DB.grn.push(doc);
  // Stock movement
  if(!isEdit){
    items.forEach(it=>{
      addMove(id,'GRN',it.itemId,wh,Number(it.qty),'');
      if(it.serials){ it.serials.split(',').map(s=>s.trim()).filter(Boolean).forEach(sn=>addSerial(sn,it.itemId,wh,id,'in')); }
    });
  }
  if(poRef){ const po=DB.po.find(x=>x.id===poRef); if(po){ po.status='รับแล้ว'; DB.save('po'); } }
  DB.save('grn'); syncDoc('grn', doc); closeModal(); navigate('grn');
  toast(`รับสินค้า GRN ${id} สำเร็จ — Stock เพิ่มแล้ว`,'success');
};

window.saveMOut=function(id,mreqRef,isEdit){
  const wh=document.getElementById('mout_wh')?.value;
  const recv=document.getElementById('mout_recv')?.value?.trim();
  if(!wh){ toast('เลือกคลัง','warning'); return; }
  if(!recv){ toast('กรอกชื่อผู้รับ','warning'); return; }
  const lim=window._LIM_mout_f;
  const items=lim?lim.get():[];
  if(!items.length){ toast('เพิ่มรายการ','warning'); return; }
  // Check stock
  for(const it of items){
    const avail=getStock(it.itemId,wh);
    if(Number(it.qty)>avail){ toast(`Stock ไม่พอ: ${itemName(it.itemId)} (มี ${fmtNum(avail)} ${itemUnit(it.itemId)})`,'error'); return; }
  }
  const doc={id,date:document.getElementById('mout_date')?.value||today(),mreqRef:mreqRef||'',
    whId:wh,receiver:recv,note:document.getElementById('mout_note')?.value||'',
    projNo:document.getElementById('mout_projno')?.value||'',
    projName:document.getElementById('mout_projname')?.value||'',
    status:'เสร็จสิ้น',items};
  if(isEdit){ const idx=DB.mout.findIndex(x=>x.id===id); if(idx>-1) DB.mout[idx]={...DB.mout[idx],...doc}; }
  else DB.mout.push(doc);
  if(!isEdit) items.forEach(it=>addMove(id,'MOUT',it.itemId,wh,-Number(it.qty),''));
  if(mreqRef){ const mreq=DB.mreq.find(x=>x.id===mreqRef); if(mreq){ mreq.status='เสร็จสิ้น'; mreq.moutRef=id; DB.save('mreq'); } }
  DB.save('mout'); syncDoc('mout', doc); closeModal(); navigate('mout');
  toast(`เบิกสินค้า ${id} สำเร็จ — ตัด Stock แล้ว`,'success');
};

window.checkTrnWh=function(){
  const f=document.getElementById('trn_from')?.value;
  const t=document.getElementById('trn_to')?.value;
  const w=document.getElementById('trn_warn'); if(!w) return;
  if(f&&t&&f===t) w.innerHTML=`<div class="alert alert-danger"><span class="alert-icon">✕</span>คลังต้นทางและปลายทางต้องไม่เหมือนกัน</div>`;
  else w.innerHTML='';
};
window.saveTrn=function(id){
  const from=document.getElementById('trn_from')?.value;
  const to=document.getElementById('trn_to')?.value;
  if(!from||!to){ toast('เลือกคลังต้นทางและปลายทาง','warning'); return; }
  if(from===to){ toast('คลังต้องไม่เหมือนกัน','error'); return; }
  const lim=window._LIM_trn_f;
  const items=lim?lim.get():[];
  if(!items.length){ toast('เพิ่มรายการ','warning'); return; }
  for(const it of items){
    const avail=getStock(it.itemId,from);
    if(Number(it.qty)>avail){ toast(`Stock ไม่พอที่ ${whName(from)}: ${itemName(it.itemId)} (มี ${fmtNum(avail)})`,'error'); return; }
  }
  const doc={id,date:today(),fromWh:from,toWh:to,
    operator:document.getElementById('trn_op')?.value||'',
    note:document.getElementById('trn_note')?.value||'',
    status:'เสร็จสิ้น',items};
  DB.trn.push(doc); syncDoc('trn', doc);
  items.forEach(it=>{
    addMove(id,'TRN-OUT',it.itemId,from,-Number(it.qty),'ออก');
    addMove(id,'TRN-IN',it.itemId,to,Number(it.qty),'เข้า');
  });
  DB.save('trn'); closeModal(); navigate('trn');
  toast(`โอนย้าย ${id} สำเร็จ`,'success');
};

window.filterSN=function(){
  const q=(document.getElementById('snQ')?.value||'').toLowerCase();
  const st=document.getElementById('snStatus')?.value||'';
  const tbody=document.getElementById('snTbody'); if(!tbody) return;
  const rows=DB.serials.filter(s=>{
    if(q&&!s.sn.toLowerCase().includes(q)&&!itemName(s.itemId).toLowerCase().includes(q)) return false;
    if(st&&s.status!==st) return false;
    return true;
  }).map(s=>`<tr>
    <td><span class="mono text-purple">${esc(s.sn)}</span></td>
    <td>${esc(itemName(s.itemId))}</td>
    <td class="fs-12">${esc(whName(s.whId))}</td>
    <td><span class="badge badge-${s.status==='available'?'done':'pending'}">${s.status==='available'?'✓ พร้อมใช้':'◷ เบิกออก'}</span></td>
    <td><span class="doc-id">${esc(s.addedDoc||'-')}</span></td>
    <td class="fs-12 text-secondary">${fmtDate(s.addedDate)}</td>
    <td><span class="doc-id">${esc(s.lastDoc||'-')}</span></td>
  </tr>`);
  tbody.innerHTML=rows.join('')||`<tr><td colspan="7"><div class="empty"><div class="empty-icon">🔢</div><div class="empty-text">ไม่พบ</div></div></td></tr>`;
};

  const no   = document.getElementById('prj_no')?.value?.trim();

  if(dup){ toast('Project No. นี้มีอยู่แล้ว','error'); return; }
  const proj = {id, projNo:no, projName:name, no, name,
    desc:document.getElementById('prj_desc')?.value||'',

  closeModal(); navigate('projects');
  toast(`${isEdit?'แก้ไข':'เพิ่ม'}โครงการ ${no} สำเร็จ`,'success');

const COLLECTIONS_MAP={pr:DB.pr,po:DB.po,grn:DB.grn,mreq:DB.mreq,mout:DB.mout,mret:DB.mret,trn:DB.trn,adj:DB.adj};

window.viewDocModal=function(type,id){
  const col=COLLECTIONS_MAP[type]; if(!col) return;
  const doc=col.find(x=>x.id===id); if(!doc) return;
  const meta=Object.entries(doc).filter(([k])=>k!=='items').map(([k,v])=>`
    <div>
      <div class="fs-11 text-muted fw-600 mb-4">${k.toUpperCase()}</div>
      <div class="fs-13">${typeof v==='string'&&v.startsWith('PR')||v?.toString().match(/^[A-Z]+-?\d/)?`<span class="doc-id">${esc(v)}</span>`:esc(v||'—')}</div>
    </div>`).join('');
  const items=doc.items||[];
  openModal(`
    <div class="modal-header">
      <div class="modal-title">${DOC_LABELS[type]||type} — <span class="doc-id">${id}</span></div>
      <div class="flex gap-6 ml-auto">
        ${badge(doc.status)}
        <button class="btn btn-ghost btn-xs" onclick="printDoc('${type}','${id}')">🖨 Print</button>

          <tbody>
            ${items.map(it=>`<tr>
              <td>${esc(itemName(it.itemId))}</td>
              <td>${esc(it.unit)}</td>
              <td class="text-right mono">${fmtNum(it.qty)}</td>
              ${it.price!==undefined?`<td class="text-right mono">${fmtNum(it.price,2)}</td><td class="text-right mono fw-600">${fmtNum(Number(it.qty)*Number(it.price),2)}</td>`:''}

            <td colspan="4" class="fw-700">รวมทั้งสิ้น</td>
            <td class="text-right mono fw-700 text-teal">${fmtNum(items.reduce((s,it)=>s+Number(it.qty||0)*Number(it.price||0),0),2)} ฿</td>
          </tr></tfoot>`:''}
        </table>
      </div>
    </div>
  `, {xl:true});
};

function resolveCol(headers, aliases){
  const hLow = headers.map(h=>String(h||'').toLowerCase().trim());
  for(const alias of aliases){
    const idx = hLow.findIndex(h=>h===alias.toLowerCase()||h.includes(alias.toLowerCase()));
    if(idx>=0) return idx;
  }
  return -1;
}

function triggerImport(type){
  const inp=document.createElement('input');
  inp.type='file'; inp.accept='.xlsx,.xls,.csv';
  inp.onchange=e=>{ const f=e.target.files[0]; if(f) readImportFile(f,type); };
  inp.click();
}

function handleDrop(e,type){
  e.preventDefault();
  const f=e.dataTransfer.files[0]; if(!f) return;
  if(!f.name.match(/\.(xlsx|xls|csv)$/i)){ toast('รองรับเฉพาะ .xlsx, .xls, .csv','error'); return; }
  readImportFile(f,type);
}

function readImportFile(file,type){
  const drop=document.getElementById('drop_'+type);
  if(drop){ drop.innerHTML=`<div style="font-size:28px">⏳</div><div class="fw-600 mt-8">กำลังอ่านไฟล์...</div>`; }
  const reader=new FileReader();
  const isCSV=file.name.toLowerCase().endsWith('.csv');
  reader.onload=ev=>{
    try{
      let rows;
      if(isCSV){
        rows=parseCSV(ev.target.result);
      } else {
        // Excel via SheetJS
        const wb=XLSX.read(ev.target.result,{type:'array'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      }
      if(!rows||rows.length<2){ toast('ไฟล์ว่างหรือไม่มีข้อมูล','error'); resetDrop(type); return; }
      showImportPreview(rows,type,file.name);
    }catch(err){ toast('อ่านไฟล์ไม่ได้: '+err.message,'error'); resetDrop(type); }
  };
  if(isCSV) reader.readAsText(file,'UTF-8');
  else reader.readAsArrayBuffer(file);
}

function parseCSV(text){
  // handle BOM
  text=text.replace(/^\uFEFF/,'');
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  return lines.map(line=>{
    const cols=[]; let cur='',inQ=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'){ inQ=!inQ; }
      else if(c===','&&!inQ){ cols.push(cur.trim()); cur=''; }
      else cur+=c;
    }
    cols.push(cur.trim());
    return cols;
  });
}

function resetDrop(type){
  const drop=document.getElementById('drop_'+type);
  if(drop) drop.innerHTML=`<div style="font-size:32px">📄</div><div class="fw-600 mt-8">คลิกหรือลากไฟล์มาวางที่นี่</div><div class="fs-12 text-muted mt-4">รองรับ .xlsx, .xls, .csv</div>`;
}

function showImportPreview(rows,type,filename){
  const headers=rows[0].map(h=>String(h||'').trim());
  const dataRows=rows.slice(1).filter(r=>r.some(c=>c!==''&&c!==null&&c!==undefined));
  const aliases=COL_ALIASES[type];
  // map columns
  const colMap={};
  Object.entries(aliases).forEach(([field,als])=>{
    const idx=resolveCol(headers,als);
    colMap[field]={idx,found:idx>=0};
  });

  const mappedCount=Object.values(colMap).filter(v=>v.found).length;
  const totalFields=Object.keys(aliases).length;

  // preview first 5 rows
  const preview=dataRows.slice(0,5).map(r=>headers.map((_,i)=>r[i]||''));

  const typeLabels={items:'ทะเบียนสินค้า',suppliers:'ผู้จัดจำหน่าย',warehouses:'คลังสินค้า',stock:'Opening Stock'};
  const typeColors={items:'var(--accent-blue)',suppliers:'var(--accent-purple)',warehouses:'var(--accent-green)',stock:'var(--accent-teal)'};

  openModal(`
    <div class="modal-header">
      <span style="font-size:18px">⬆</span>
      <div class="modal-title">Preview — ${typeLabels[type]||type}</div>
      <button class="btn btn-ghost btn-icon btn-sm" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="grid g3 mb-16">
        <div class="stat-card">
          <div class="stat-label">ไฟล์</div>
          <div class="stat-value fs-13 mono">${esc(filename)}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">แถวข้อมูล</div>
          <div class="stat-value" style="color:var(--accent-blue)">${dataRows.length.toLocaleString()}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">คอลัมน์จับคู่ได้</div>
          <div class="stat-value" style="color:${mappedCount===totalFields?'var(--accent-green)':'var(--accent-amber)'}">${mappedCount}/${totalFields}</div>
        </div>
      </div>

      <!-- Column mapping -->
      <div class="card mb-16">
        <div class="card-header">🗺 การจับคู่คอลัมน์</div>
        <div class="card-body">
          <div class="grid g2" style="gap:8px">
            ${Object.entries(colMap).map(([field,v])=>`
              <div class="flex items-center gap-8">
                <span style="width:8px;height:8px;border-radius:50%;background:${v.found?'var(--accent-green)':'var(--text-muted)'};flex-shrink:0"></span>
                <span class="fs-12 fw-600" style="width:100px">${field}</span>
                <span class="fs-12 text-secondary">${v.found?`→ "${esc(headers[v.idx])}"`:'-ไม่พบ-'}</span>

            `).join('')}

        </div>
      </div>

      <!-- Data preview -->
      <div class="card">
        <div class="card-header">👁 ตัวอย่างข้อมูล (5 แถวแรก)</div>
        <div class="table-wrap">
          <table class="table">
            <thead><tr>${headers.map(h=>`<th>${esc(h)}</th>`).join('')}</tr></thead>
            <tbody>${preview.map(r=>`<tr>${r.map(c=>`<td class="fs-12">${esc(String(c))}</td>`).join('')}</tr>`).join('')}</tbody>
          </table>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">ยกเลิก</button>
      <button class="btn btn-primary" onclick="confirmImport(${JSON.stringify(dataRows)},${JSON.stringify(colMap)},${JSON.stringify(filename)},'${type}')">✓ ยืนยัน Import ${dataRows.length} แถว</button>
    </div>
  `,{xl:true});
}

window.confirmImport=function(dataRows,colMap,filename,type){
  closeModal();
  let imported=0, skipped=0, errors=[];
  const get=(row,field)=>{
    const m=colMap[field];
    if(!m||!m.found) return '';
    return String(row[m.idx]||'').trim();
  };

  if(type==='items'){
    dataRows.forEach((row,i)=>{
      const name=get(row,'name'); const code=get(row,'code');
      if(!name){ skipped++; return; }
      const existing=code?DB.items.find(x=>x.code===code):null;
      const item={
        id: existing?.id||genId('ITM'),
        code: code||genId('P'),
        name, category:get(row,'category')||'ทั่วไป',
        unit: get(row,'unit')||'ชิ้น',
        minQty: Number(get(row,'minQty'))||0,
        cost:   Number(get(row,'cost'))||0,
        price:  Number(get(row,'price'))||0,
        hasSerial: ['true','1','yes','มี'].includes(get(row,'hasSerial').toLowerCase()),
      };
      if(existing){ Object.assign(existing,item); }
      else { DB.items.push(item); }
      imported++;
    });
    DB.save('items');
  }

  else if(type==='suppliers'){
    dataRows.forEach(row=>{
      const name=get(row,'name');
      if(!name){ skipped++; return; }
      const existing=DB.suppliers.find(x=>x.name===name);
      const s={
        id:existing?.id||genId('SUP'),
        name, tel:get(row,'tel'), email:get(row,'email'),
        addr:get(row,'addr'), taxid:get(row,'taxid'),
        contactPerson:get(row,'contactPerson'),
      };
      if(existing){ Object.assign(existing,s); }
      else { DB.suppliers.push(s); }
      imported++;
    });
    DB.save('suppliers');
  }

  else if(type==='warehouses'){
    dataRows.forEach(row=>{
      const name=get(row,'name');
      if(!name){ skipped++; return; }
      const existing=DB.warehouses.find(x=>x.name===name);
      const w={
        id:existing?.id||genId('WH'),
        name, loc:get(row,'loc'), desc:get(row,'desc'), active:true,
      };
      if(existing){ Object.assign(existing,w); }
      else { DB.warehouses.push(w); }
      imported++;
    });
    DB.save('warehouses');
  }

  else if(type==='stock'){
    dataRows.forEach(row=>{
      const qtyStr=get(row,'qty');
      const qty=Number(qtyStr);
      if(!qty||isNaN(qty)){ skipped++; return; }
      // หาสินค้า
      const ic=get(row,'itemCode'), iname=get(row,'itemName');
      const item=ic?DB.items.find(x=>x.code===ic)||DB.items.find(x=>x.id===ic)
                    :DB.items.find(x=>x.name===iname);
      if(!item){ skipped++; errors.push(`ไม่พบสินค้า: ${ic||iname}`); return; }
      // หาคลัง
      const wc=get(row,'whCode'), wname=get(row,'whName');
      const wh=wc?DB.warehouses.find(x=>x.id===wc)||DB.warehouses.find(x=>x.name===wc)
                 :DB.warehouses.find(x=>x.name===wname);
      if(!wh){ skipped++; errors.push(`ไม่พบคลัง: ${wc||wname}`); return; }
      addMove('OPEN-STOCK','OPEN',item.id,wh.id,qty,'Opening Stock Import');
      imported++;
    });
  }

  // บันทึกประวัติ
  const hist=DB._read('importHistory',[]);
  hist.push({
    date:today(),
    time:new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'}),
    type:{items:'Items',suppliers:'Suppliers',warehouses:'Warehouses',stock:'Opening Stock'}[type]||type,
    filename, imported, skipped, ok:errors.length===0
  });
  localStorage.setItem('sf_importHistory',JSON.stringify(hist));

  // แสดงผล
  let msg=`Import สำเร็จ ${imported} รายการ`;
  if(skipped) msg+=` | ข้าม ${skipped} รายการ`;
  toast(msg, errors.length?'warning':'success');
  if(errors.length){
    setTimeout(()=>toast('ข้อผิดพลาด: '+errors.slice(0,3).join(', ')+(errors.length>3?'...':''),'error'),500);
  }
  navigate('import');
};

  if(btn) btn.style.display='';
}

/* ═══════════════════════════════════════════
   AUTO PULL & AUTO SYNC
   ═══════════════════════════════════════════ */

// ── Auto Pull เมื่อเปิดหน้าเว็บ (ถ้ามี Web App URL) ──
async function autoPullOnLoad(){
  if(!SETTINGS.gsWebAppUrl) return;
  // แสดง indicator ที่ sync button
  const btn = document.getElementById('syncBtn');
  const origTxt = btn?.textContent;
  if(btn){ btn.textContent='⬇ กำลัง Pull...'; btn.disabled=true; }

  try{
    const result = await gsGet({action:'syncAll'});
    if(result?.ok){
      const data = result.data||{};
      let count=0;
      ['items','warehouses','suppliers','pr','po','grn','mreq','mout','mret','adj','trn','stock','serials'].forEach(k=>{
        if(Array.isArray(data[k])&&data[k].length>0){ DB[k]=data[k]; DB.save(k); count+=data[k].length; }
      });
      if(count>0){
        renderNav(); renderPage();
        toast(`⬇ Auto Pull สำเร็จ — ${count} รายการ`, 'success');
      }
    }
  }catch(e){ console.warn('Auto Pull failed:', e); }

  if(btn){ btn.textContent=origTxt||'🔄 Sync ขึ้น Sheets'; btn.disabled=false; }
}

// ── Auto Sync ทุก 1 นาที (push ข้อมูลขึ้น Sheets แบบ silent) ──
let _autoSyncTimer = null;
let _lastAutoSync  = 0;

async function autoSyncSilent(){
  if(!SETTINGS.gsWebAppUrl) return;
  if(SETTINGS.gsSyncing) return;                  // ถ้ากำลัง sync manual อยู่ ข้าม
  if(Date.now() - _lastAutoSync < 55000) return;  // ป้องกัน sync ถี่เกิน

  _lastAutoSync = Date.now();
  SETTINGS.gsSyncing = true;

  // อัปเดต indicator เล็กๆ บน sync button
  const btn = document.getElementById('syncBtn');
  const origTxt = btn?.textContent;
  if(btn){ btn.textContent='⏳ Auto Sync...'; }

  try{
    const allData = {};
    ['items','warehouses','suppliers','pr','po','grn','mreq','mout','mret','adj','trn','stock','serials'].forEach(k=>{
      allData[k]=DB[k]||[];
    });
    const result = await gsPost('fullSync','',allData);
    if(result?.ok){
      // แสดง indicator สั้นๆ ที่มุมขวาล่างของ sync button
      if(btn) btn.textContent='✓ Synced';
      setTimeout(()=>{ if(btn) btn.textContent=origTxt||'🔄 Sync ขึ้น Sheets'; }, 2000);
    } else {
      if(btn) btn.textContent=origTxt||'🔄 Sync ขึ้น Sheets';
    }
  }catch(e){
    if(btn) btn.textContent=origTxt||'🔄 Sync ขึ้น Sheets';
    console.warn('Auto Sync failed:', e);
  }

  SETTINGS.gsSyncing = false;
}

function startAutoSync(){
  if(_autoSyncTimer) clearInterval(_autoSyncTimer);
  _autoSyncTimer = setInterval(autoSyncSilent, 60000); // ทุก 1 นาที
}

// ── Status bar แสดงเวลา sync ล่าสุด ──
function updateSyncStatusBar(){
  const bar = document.getElementById('syncStatusBar');
  if(!bar) return;
  if(!SETTINGS.gsWebAppUrl){
    bar.style.display='none'; return;
  }
  bar.style.display='flex';
  if(_lastAutoSync){
    const d = new Date(_lastAutoSync);
    const t = d.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    bar.innerHTML = `<span style="color:#2f855a">● Auto Sync ON</span> &nbsp;|&nbsp; Synced ล่าสุด: <strong>${t}</strong> &nbsp;|&nbsp; Auto Pull ทุก Login &nbsp;|&nbsp; Auto Sync ทุก 1 นาที`;
  } else {
    bar.innerHTML = `<span style="color:#d97706">● Auto Sync ON</span> &nbsp;|&nbsp; รอ Sync รอบแรก...`;
  }
}
setInterval(updateSyncStatusBar, 5000);

// ── เริ่มต้นระบบ Auto ──
if(SETTINGS.gsWebAppUrl){
  // Auto Pull เมื่อ login สำเร็จหรือ session ยังอยู่
  setTimeout(autoPullOnLoad, 800);
  // เริ่ม Auto Sync loop
  startAutoSync();
  updateSyncStatusBar();
}
</script>
</body>
</html>
